<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel B2B - Sistema del Cliente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 10px; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        .card { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 5px; font-size: 22px;}
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: bold;}
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        button { border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-blue { background-color: #009EE3; color: white; }
        .btn-blue:hover { background-color: #007eb5; }
        .btn-green { background-color: #00a650; color: white; }
        .btn-green:hover { background-color: #00813e; }
        .loader { display: none; text-align: center; margin-top: 15px; font-weight: bold; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #e8f5e9; border: 1px solid #c8e6c9; text-align: center; }
        .badge { background: #333; color: white; padding: 3px 8px; border-radius: 10px; font-size: 11px; float: right; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <span class="badge">Fase 1</span>
            <h2>Panel de Configuración</h2>
            <p>Vinculá la cuenta de Mercado Pago del local.</p>

            <div class="input-group">
                <label>Client ID</label>
                <input type="text" id="clientId" value="ENUAR">
            </div>
            <div class="input-group">
                <label>X-API-Key</label>
                <input type="password" id="apiKey" placeholder="Pegá el API Key del cliente">
            </div>

            <button class="btn-blue" id="btnVincular" onclick="iniciarVinculacion()">🔗 Autorizar Mercado Pago</button>
            <div id="loader1" class="loader" style="color:#009EE3">Generando conexión... ⏳</div>
        </div>

        <div class="card">
            <span class="badge" style="background:#00a650">Fase 2</span>
            <h2>Caja Registradora</h2>
            <p>Generá un link de pago para el cliente final.</p>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>ID del Vendedor (Supabase)</label>
                    <input type="number" id="vendorId" placeholder="Ej: 14">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Monto ($)</label>
                    <input type="number" id="monto" value="500">
                </div>
            </div>

            <button class="btn-green" id="btnCobrar" onclick="generarCobro()">💸 Generar Link de Pago</button>
            <div id="loader2" class="loader" style="color:#00a650">Armando orden... ⏳</div>

            <div id="resultadoPago" class="result-box">
                <p style="color: #2e7d32; font-weight: bold; margin-bottom: 10px;">¡Orden Creada!</p>
                <a id="linkDePago" href="#" target="_blank" style="display: inline-block; background: #009EE3; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                    Ir a Pagar
                </a>
            </div>
        </div>

    </div>

    <script>
        // --- LOGICA DE LA FASE 1 (La que ya tenías) ---
        async function iniciarVinculacion() {
            const clientId = document.getElementById('clientId').value;
            const apiKey = document.getElementById('apiKey').value;
            if(!clientId || !apiKey) return alert("Falta el Client ID o API Key");

            document.getElementById('btnVincular').style.display = 'none';
            document.getElementById('loader1').style.display = 'block';

            try {
                const response = await fetch(`https://motor-de-pagos.onrender.com/auth/mp-url?client_id=${clientId}`, {
                    headers: { 'X-API-Key': apiKey }
                });
                const data = await response.json();
                if (response.ok && data.auth_url) window.location.href = data.auth_url;
                else throw new Error(data.error || "Error al conectar");
            } catch (error) {
                alert(error.message);
                document.getElementById('btnVincular').style.display = 'block';
                document.getElementById('loader1').style.display = 'none';
            }
        }

        // --- LOGICA DE LA FASE 2 (NUEVA) ---
        async function generarCobro() {
            const apiKey = document.getElementById('apiKey').value;
            const vendorId = document.getElementById('vendorId').value;
            const monto = document.getElementById('monto').value;
            
            if(!apiKey) return alert("Necesitás poner la X-API-Key en el panel de arriba");
            if(!vendorId || !monto) return alert("Completá el ID del Vendedor y el Monto");

            document.getElementById('btnCobrar').style.display = 'none';
            document.getElementById('loader2').style.display = 'block';
            document.getElementById('resultadoPago').style.display = 'none';

            // ⚠️ Ajustá esta URL a tu endpoint real de creación de orden
            const urlOrdenes = 'https://motor-de-pagos.onrender.com/ordenes'; 

            try {
                const response = await fetch(urlOrdenes, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        vendor_id: parseInt(vendorId),
                        monto: parseFloat(monto),
                        moneda: "ARS",
                        concepto: "Prueba E2E desde Simulador Frontend"
                    })
                });

                const data = await response.json();

                if (response.ok && data.checkout_url) {
                    // Si todo sale bien, mostramos el botón azul
                    document.getElementById('linkDePago').href = data.checkout_url;
                    document.getElementById('resultadoPago').style.display = 'block';
                } else {
                    alert('Error del Motor: ' + JSON.stringify(data));
                }
            } catch (error) {
                console.error(error);
                alert("Error de red intentando crear la orden.");
            } finally {
                document.getElementById('btnCobrar').style.display = 'block';
                document.getElementById('loader2').style.display = 'none';
            }
        }
    </script>
</body>
</html>
