<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel B2B - Sistema del Cliente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 10px; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        .card { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 5px; font-size: 22px;}
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: bold;}
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        button { border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-blue { background-color: #009EE3; color: white; }
        .btn-blue:hover { background-color: #007eb5; }
        .btn-green { background-color: #00a650; color: white; }
        .btn-green:hover { background-color: #00813e; }
        .loader { display: none; text-align: center; margin-top: 15px; font-weight: bold; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #e8f5e9; border: 1px solid #c8e6c9; text-align: center; }
        .badge { background: #333; color: white; padding: 3px 8px; border-radius: 10px; font-size: 11px; float: right; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <span class="badge">Fase 1</span>
            <h2>Panel de Configuración</h2>
            <p>Vinculá la cuenta de Mercado Pago del local.</p>

            <div class="input-group">
                <label>Client ID (De Supabase)</label>
                <input type="text" id="clientId" value="ENUAR">
            </div>
            <div class="input-group">
                <label>X-API-Key (De Supabase)</label>
                <input type="password" id="apiKey" placeholder="Pegá el API Key del cliente">
            </div>

            <button class="btn-blue" id="btnVincular" onclick="iniciarVinculacion()">🔗 Autorizar Mercado Pago</button>
            <div id="loader1" class="loader" style
